<html lang="en">
    <head>
        <title>Common Grounds</title>
    </head>
    <body>
        <h1 style="text-align: center;">Common Grounds</h1>  
        {% if request.user.is_authenticated %}
            Hello, {{ request.user }}!
            <form method="POST" action="{% url 'logout' %}">
                {% csrf_token %}
                <button type="submit">Logout</button>
            </form>
        {% else %}
            <a href="{% url 'login' %}">Login</a>
        {% endif %}

        {% block content %}
        {% endblock %}
    </body>
</html>
