{% extends 'base.html' %}

{% block content %}

<p>{{book.genre}}</p>

<p>{{book.publication_year}}</p>
<br>
<h4>Created On: {{book.created_on}}</h4>
<h4>Updated On: {{book.updated_on}}</h4>
{% endblock %}
